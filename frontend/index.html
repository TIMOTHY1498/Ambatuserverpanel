<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard - ambatuserverpanel</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
    <link rel="icon" type="image/png" href="./asset/png/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
        <div id="box_info" id="user_info">
            <h2>hi {user}, </h2>
            <h2>welcome back lol :3</h2>
            <div>
                <p id="arch"><b>Arch</b>: NULL</p>
                <p id="os"><b>OS</b>: NULL</p>
                <p id="kernel"><b>Kernel</b>: NULL</p>
                <p id="uptime"><b>Uptime</b>: NULL</p>
            </div>
        </div>
        <div id="box_info" id="cpu_info">
            <h2>cpu usage</h2>
            <div>
                <p id="cpu_total_usage"><b>Total Usage</b>: 0%</p>
                <p id="cpu_temperature"><b>Temperature</b>: 0°C</p>
            </div>
        </div>
</body>
</html>
